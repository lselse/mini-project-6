version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
      java: corretto17
    commands:
      - echo "Installing dependencies..."
      - npm install --prefix frontend
      
  build:
    commands:
      - echo "Building projects..."
      - npm run build --prefix frontend
      - cd backend && chmod +x ./gradlew && ./gradlew clean build -x test && cd ..
      
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWSREGION | docker login --username AWS --password-stdin $AWSNUM.dkr.ecr.$AWSREGION.amazonaws.com
      
      - echo "Building Docker images..."
      - docker build -t $AWSNUM.dkr.ecr.$AWSREGION.amazonaws.com/mini161-backend:latest ./backend
      - docker build -t $AWSNUM.dkr.ecr.$AWSREGION.amazonaws.com/mini161-frontend:latest ./frontend
      
  post_build:
    commands:
      - echo "Pushing Docker images to ECR..."
      - docker push $AWSNUM.dkr.ecr.$AWSREGION.amazonaws.com/mini161-backend:latest
      - docker push $AWSNUM.dkr.ecr.$AWSREGION.amazonaws.com/mini161-frontend:latest
      - echo "Build and Push completed!"

artifacts:
  files:
    - 'k8s/**/*'
    - 'buildspec-deploy.yml'