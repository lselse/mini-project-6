version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
      java: corretto17
    commands:
      - echo "Installing dependencies..."
      - npm install --prefix frontend
      
  build:
    commands:
      - echo "Building Frontend..."
      - npm run build --prefix frontend
      - echo "Building Backend..."
      - cd backend && chmod +x ./gradlew && ./gradlew clean build -x test && cd ..
      
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWSREGION | docker login --username AWS --password-stdin $AWSNUM.dkr.ecr.$AWSREGION.amazonaws.com
      
      - echo "Building Docker images..."
      - docker build -t $AWSNUM.dkr.ecr.$AWSREGION.amazonaws.com/mini161-backend:latest ./backend
      - docker build -t $AWSNUM.dkr.ecr.$AWSREGION.amazonaws.com/mini161-frontend:latest ./frontend
      
  post_build:
    commands:
      - echo "Pushing Docker images..."
      - docker push $AWSNUM.dkr.ecr.$AWSREGION.amazonaws.com/mini161-backend:latest
      - docker push $AWSNUM.dkr.ecr.$AWSREGION.amazonaws.com/mini161-frontend:latest
      
      - echo "Updating EKS cluster config..."
      - aws eks update-kubeconfig --name mini161-cluster --region $AWSREGION
      
      - echo "Deploying to EKS..."
      - kubectl apply -f k8s/
      # ✨ 핵심 추가: 쿠버네티스가 이미지를 새로 가져가도록 강제합니다!
      - kubectl set image deployment/backend-deployment backend=$AWSNUM.dkr.ecr.$AWSREGION.amazonaws.com/mini161-backend:latest
      - kubectl set image deployment/frontend-deployment frontend=$AWSNUM.dkr.ecr.$AWSREGION.amazonaws.com/mini161-frontend:latest
      - echo "Deployment completed!"