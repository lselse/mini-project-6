version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
      java: corretto17
    commands:
      - echo "Installing dependencies..."
      # 프론트엔드: --prefix 옵션을 사용하여 cd 없이 설치
      - npm install --prefix frontend
      
  build:
    commands:
      - echo "Building projects..."
      # 프론트엔드 빌드
      - npm run build --prefix frontend
      
      # 백엔드 빌드
      # 현재 위치가 루트이므로, backend 폴더로 진입하여 빌드 수행
      - cd backend && chmod +x ./gradlew && ./gradlew clean build -x test
      
  post_build:
    commands:
      - echo "Build completed!"

artifacts:
  # 여러 결과물을 합치기 위해 base-directory를 루트로 설정
  base-directory: .
  files:
    - frontend/dist/**/*
    - backend/build/libs/*.jar
  # 파일 경로를 그대로 유지하여 S3나 배포 대상에 전달
  discard-paths: no