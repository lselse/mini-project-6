apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mini161-ingress
  namespace: default
  annotations:
    # 💡 이 어노테이션들이 매우 중요합니다. 컨트롤러가 이 설정을 읽고 ALB를 만듭니다.
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing # 인터넷을 통해 접속 가능한 퍼블릭 ALB 생성
    alb.ingress.kubernetes.io/target-type: ip         # EKS 파드 IP로 트래픽을 직접 전달 (성능 최적화)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  rules:
    - http:
        paths:
          # 1. 백엔드 라우팅: /api로 들어오는 모든 요청은 backend-service로 전달
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080

          # 2. 프론트엔드 라우팅: 그 외 모든 루트(/) 요청은 frontend-service로 전달
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 8