apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        # ECR에 푸시한 이미지를 정확히 바라보도록 명시하는 것이 좋습니다.
        image: 879772956301.dkr.ecr.us-west-1.amazonaws.com/mini161-backend:latest
        # ✨ 핵심 1: 항상 최신 이미지를 체크하도록 설정
        imagePullPolicy: Always 
        ports:
        - containerPort: 8080
        # ✨ 핵심 2: 백엔드 상태를 확인하는 헬스 체크 (실무 표준)
        livenessProbe:
          httpGet:
            path: /books # 또는 서버 상태 확인이 가능한 경로
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP # 백엔드는 보통 외부 노출 안 하고 ClusterIP를 씁니다.
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080