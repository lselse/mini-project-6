version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  pre_build:
    commands:
      # ✨ 1. 백엔드 폴더로 먼저 이동합니다.
      - cd backend
      - echo "Giving execute permission to gradlew..."
      - chmod +x ./gradlew
  build:
    commands:
      - echo "Building Spring Boot Application..."
      - ./gradlew clean build -x test
  post_build:
    commands:
      - echo "Build completed successfully!"

artifacts:
  # ✨ 2. 결과물 추출 경로에 폴더명을 반영합니다. (디렉토리 구조 유지를 위해 discard-paths 설정 추가)
  base-directory: backend/build/libs
  files:
    - '*.jar'
  discard-paths: yes # S3나 배포 서버에 넘길 때 폴더 구조는 떼어내고 알맹이(.jar)만 넘깁니다.