version: 0.2

env:
  variables:
    S3_BUCKET: "my-react-frontend-bucket"

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      # ✨ 1. 프론트엔드 폴더로 먼저 이동합니다.
      - cd frontend
      - echo "Installing dependencies..."
      - npm install
  build:
    commands:
      - echo "Building the Vite project..."
      - npm run build
  post_build:
    commands:
      - echo "Deploying to S3..."
      # 폴더 안에서 작업 중이므로 경로를 잘 확인하세요.
      - aws s3 sync dist/ s3://$S3_BUCKET --delete

artifacts:
  # ✨ 2. 결과물 추출 경로에도 폴더명을 앞에 붙여줍니다.
  base-directory: frontend/dist
  files:
    - '**/*'